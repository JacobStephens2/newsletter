<VirtualHost *:80>
    ServerName newsletter.stephens.page
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3462/
    ProxyPassReverse / http://127.0.0.1:3462/
    ErrorLog ${APACHE_LOG_DIR}/newsletter.stephens.page-error.log
    CustomLog ${APACHE_LOG_DIR}/newsletter.stephens.page-access.log combined
</VirtualHost>
